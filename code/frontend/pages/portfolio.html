    <script>
      // Apply saved theme before paint to avoid a flash of the wrong theme
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-theme");

    </script>

<!-- include: header active=portfolio -->

        <section class="professional-experience">
          <!-- Insert role cards here -->
          <a href="/code/frontend/socket-demo.html" class="role-card">
            <div class="card-content">
              <img
                src="/assets/socket-logo.svg"
                alt="Project Icon"
                class="company-logo"
              />
              <div class="text-content">
                <h3>Socket Supply-Chain Risk Scanner</h3>
              </div>
            </div>

                    <a href="/code/frontend/linea-guide.html" class="role-card">

        </section>
      </main>

<!-- include: footer -->
    </div>
    <div class="theme-switch-container">
      <button id="theme-toggle">Toggle Dark/Light Mode</button>
    </div>
    <script src="/code/frontend/theme-switch.js"></script>
